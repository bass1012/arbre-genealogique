  <circle cx="26" cy="28" r="2" fill="white"/>
  <circle cx="38" cy="28" r="2" fill="white"/>
  <circle cx="20" cy="34" r="2" fill="white"/>
  <circle cx="44" cy="34" r="2" fill="white"/>
</svg>
